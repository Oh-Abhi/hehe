<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ohavi.me/nude | 8-Bit Disco Party</title>
  <meta name="description" content="Welcome to the pixel disco! Turn up the volume and watch the avatar dance to the beat.">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;900&family=Press+Start+2P&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <!-- CRT screen overlay -->
  <div class="crt-overlay"></div>

  <!-- Autoplay Lock Overlay -->
  <div id="unlock-overlay" class="overlay">
    <div class="unlock-card">
      <div class="card-header">INITIATING_DANCE.EXE</div>
      <div class="card-body">
        <h2 class="pixel-glow">READY FOR DISCO?</h2>
        <p>Unmute audio and launch high-energy retro particles</p>
        <button id="btn-unlock" class="btn btn-unlock">
          ACTIVATE DISCO MODE 🕺
        </button>
      </div>
    </div>
  </div>

  <!-- Background strobe flashes -->
  <div class="strobe-light" id="strobe-left"></div>
  <div class="strobe-light" id="strobe-right"></div>
  
  <!-- Starfield & dance floor -->
  <div class="stars-bg"></div>
  <div class="disco-stage">
    <!-- Spinning Disco Ball -->
    <div class="disco-ball-container">
      <div class="disco-rope"></div>
      <div class="disco-ball"></div>
      <div class="disco-rays" id="disco-rays"></div>
    </div>

    <!-- Visualizer Canvas (Background for particles & glows) -->
    <canvas id="visualizer-canvas"></canvas>

    <!-- Main Dancing Arena -->
    <div class="dance-floor-container">
      <div class="retro-dance-floor" id="dance-floor">
        <div class="floor-tile"></div>
        <div class="floor-tile"></div>
        <div class="floor-tile"></div>
        <div class="floor-tile"></div>
        <div class="floor-tile"></div>
        <div class="floor-tile"></div>
        <div class="floor-tile"></div>
        <div class="floor-tile"></div>
        <div class="floor-tile"></div>
      </div>
      
      <!-- Dancing Character Avatar -->
      <div class="avatar-container" id="avatar-container">
        <!-- We use mix-blend-mode: screen to make black background of generated png transparent -->
        <img src="../assets/pixel_dancer.png" alt="Pixel Dancer" class="pixel-avatar" id="pixel-avatar">
        <div class="avatar-shadow"></div>
      </div>
    </div>
  </div>

  <!-- Interactive Control Dashboard -->
  <div class="dashboard">
    <div class="dashboard-section header-section">
      <h3 class="pixel-text-small glitched">DISCO_CONTROL_v1.0</h3>
      <span class="music-note" id="music-note">🎵</span>
    </div>

    <!-- Visualizer Bars (Top bar of controller) -->
    <div class="mini-equalizer" id="mini-equalizer">
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
      <div class="eq-bar"></div>
    </div>

    <div class="controls-grid">
      <!-- Media Controls -->
      <div class="control-box media-controls">
        <div class="control-label">AUDIO</div>
        <div class="btn-group">
          <button id="btn-play-pause" class="ctrl-btn">PAUSE</button>
          <button id="btn-mute" class="ctrl-btn">MUTE</button>
        </div>
        <div class="volume-slider-container">
          <span class="vol-icon">🔈</span>
          <input type="range" id="volume-slider" class="range-slider" min="0" max="1" step="0.05" value="0.7">
          <span class="vol-icon">🔊</span>
        </div>
      </div>

      <!-- Dance Controls -->
      <div class="control-box dance-controls">
        <div class="control-label">DANCE MOVES</div>
        <div class="btn-group">
          <button id="btn-move-bounce" class="ctrl-btn active">BOUNCE</button>
          <button id="btn-move-spin" class="ctrl-btn">SPIN</button>
          <button id="btn-move-slide" class="ctrl-btn">SLIDE</button>
        </div>
        <div class="speed-control">
          <span>SPEED:</span>
          <button id="btn-speed-slow" class="speed-btn">SLOW</button>
          <button id="btn-speed-norm" class="speed-btn active">NORM</button>
          <button id="btn-speed-hyper" class="speed-btn">HYPER</button>
        </div>
      </div>

      <!-- Soundboard -->
      <div class="control-box soundboard">
        <div class="control-label">SOUNDBOARD</div>
        <div class="soundboard-buttons">
          <button class="sound-btn" data-sound="airhorn">🎺 AIRHORN</button>
          <button class="sound-btn" data-sound="scratch">💿 SCRATCH</button>
          <button class="sound-btn" data-sound="laser">⚡ LASER</button>
          <button class="sound-btn" data-sound="cheer">🎉 CHEER</button>
        </div>
      </div>
    </div>

    <!-- Currently Playing Info -->
    <div class="dashboard-footer">
      <div class="scrolling-text-container">
        <div class="scrolling-text" id="track-name">
          NOW PLAYING: Chiptune Groove Machine (Procedural Retro Synth Core) • Dance Party Active at ohavi.me/nude • 
        </div>
      </div>
    </div>
  </div>

  <!-- Audio element fallback if needed (will be loaded procedurally in app.js as well) -->
  <audio id="bg-audio" loop></audio>

  <script src="app.js"></script>
</body>
</html>
