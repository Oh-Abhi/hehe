<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ohavi.me</title>
  <style>
    body {
      background-color: #000;
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
    }
  </style>
</head>
<body>
  <script>
    (function() {
      let keys = "";
      window.addEventListener("keydown", function(e) {
        keys += e.key;
        if (keys.length > 4) {
          keys = keys.substring(keys.length - 4);
        }
        if (keys === "1301") {
          if (window.location.protocol === "file:") {
            window.location.href = "love/index.html";
          } else {
            window.location.href = "/love/";
          }
        }
      });
    })();
  </script>
</body>
</html>
